spring.application.name=companysearch
spring.datasource.url=jdbc:postgresql://localhost:5432/companysearch
spring.datasource.username=postgres
spring.datasource.password=postgres


spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true


spring.flyway.enabled=true


scraper.user-agent=CompanySearchBot/1.0 (educational project)
scraper.delay-ms=1000
scraper.max-companies=100


cache.ttl-hours=24