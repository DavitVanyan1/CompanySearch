spring.application.name=companysearch
spring.datasource.url=jdbc:postgresql://localhost:5433/companysearch
spring.datasource.username=postgres
spring.datasource.password=postgres


spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

spring.jpa.show-sql=true



logging.level.org.flywaydb=DEBUG
spring.jpa.defer-datasource-initialization=true
spring.flyway.create-schemas=true

scraper.user-agent=CompanySearchBot/1.0 (educational project)
scraper.delay-ms=1000
scraper.max-companies=100


cache.ttl-hours=24