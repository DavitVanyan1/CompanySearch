services:
  postgres:
    image: postgres:16
    container_name: companysearch-db
    environment:
      POSTGRES_DB: companysearch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - companysearch-data:/var/lib/postgresql/data

volumes:
  companysearch-data: